name: Tests

on:
  push:
    branches:
      - main
      - dev
    paths:
      - "deeptutor/**"
      - "deeptutor_cli/**"
      - "tests/**"
      - "scripts/check_contract_guard.py"
      - "scripts/check_turn_contract_guard.py"
      - "requirements/**"
      - "requirements.txt"
      - "pyproject.toml"
      - "CONTRACT.md"
      - "AGENTS.md"
      - "contracts/**"
      - "web/**"
      - "wx_miniprogram/**"
      - "deployment/**"
      - "docker-compose.yml"
      - "docs/zh/guide/unified-turn-contract.md"
      - ".github/workflows/tests.yml"
      - ".github/pull_request_template.md"
  pull_request:
    branches:
      - main
      - dev
    paths:
      - "deeptutor/**"
      - "deeptutor_cli/**"
      - "tests/**"
      - "scripts/check_contract_guard.py"
      - "scripts/check_turn_contract_guard.py"
      - "requirements/**"
      - "requirements.txt"
      - "pyproject.toml"
      - "CONTRACT.md"
      - "AGENTS.md"
      - "contracts/**"
      - "web/**"
      - "wx_miniprogram/**"
      - "deployment/**"
      - "docker-compose.yml"
      - "docs/zh/guide/unified-turn-contract.md"
      - ".github/workflows/tests.yml"
      - ".github/pull_request_template.md"

jobs:
  contract-guard:
    name: Contract Guard
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run contract guard
        run: |
          python scripts/check_contract_guard.py --base "$BASE_SHA" --head "$HEAD_SHA"
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.sha }}

  import-check:
    name: Import Check (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: contract-guard
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements/server.txt', 'requirements/cli.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install minimal dependencies for import check
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/server.txt

      - name: Check module imports
        run: |
          echo "🐍 Testing with Python ${{ matrix.python-version }}"
          python -c "from deeptutor.runtime.orchestrator import ChatOrchestrator; print('✅ Orchestrator imports OK')"
          python -c "from deeptutor.runtime.registry.tool_registry import get_tool_registry; print('✅ Tool registry imports OK')"
          python -c "from deeptutor.runtime.registry.capability_registry import get_capability_registry; print('✅ Capability registry imports OK')"
          python -c "from deeptutor.services.config.env_store import EnvStore; print('✅ EnvStore imports OK')"
          python -c "from deeptutor.api.routers.unified_ws import unified_websocket; print('✅ Unified WS imports OK')"
          python -c "from deeptutor.services.prompt.manager import PromptManager; print('✅ Prompt manager imports OK')"
          python -c "from deeptutor.logging import get_logger; print('✅ Logging imports OK')"
        env:
          PYTHONPATH: ${{ github.workspace }}

  smoke-tests:
    name: Smoke Tests (Python 3.11)
    runs-on: ubuntu-latest
    needs: import-check

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-3.11-${{ hashFiles('requirements/server.txt', 'requirements/cli.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-3.11-

      - name: Install smoke test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/server.txt
          pip install pytest pytest-asyncio

      - name: Create minimal runtime config
        run: |
          mkdir -p data/user/settings
          cat > data/user/settings/main.yaml <<'YAML'
          system:
            language: en
          logging:
            level: WARNING
          YAML

      - name: Run smoke tests
        run: |
          echo "🧪 Running smoke test subset"
          pytest -q --import-mode=importlib \
            tests/api \
            tests/cli \
            tests/services/test_app_facade.py \
            tests/services/test_model_catalog.py \
            tests/services/test_path_service.py \
            tests/services/memory \
            tests/services/session \
            tests/tools
        env:
          PYTHONPATH: ${{ github.workspace }}

  frontend-checks:
    name: Frontend Checks
    runs-on: ubuntu-latest
    needs: contract-guard

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Run frontend checks
        working-directory: web
        run: |
          npm run lint
          ./node_modules/.bin/tsc -p tsconfig.json --noEmit
          npm run build:perf

  wx-checks:
    name: WX Checks
    runs-on: ubuntu-latest
    needs: contract-guard

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Syntax check Mini Program JS
        run: |
          find wx_miniprogram -name '*.js' -print0 | xargs -0 -n1 node --check

      - name: Run Mini Program regression scripts
        run: |
          node wx_miniprogram/tests/test_mcq_detect.js
          node wx_miniprogram/tests/test_markdown.js

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [contract-guard, import-check, smoke-tests, frontend-checks, wx-checks]
    if: always()

    steps:
      - name: Check test results
        run: |
          echo "## 🧪 Test Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Contract guard | ${{ needs.contract-guard.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Import check (3.11/3.12) | ${{ needs.import-check.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Smoke tests (3.11) | ${{ needs.smoke-tests.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend checks | ${{ needs.frontend-checks.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| WX checks | ${{ needs.wx-checks.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY

      - name: Fail if tests failed
        if: needs.contract-guard.result == 'failure' || needs.import-check.result == 'failure' || needs.smoke-tests.result == 'failure' || needs.frontend-checks.result == 'failure' || needs.wx-checks.result == 'failure'
        run: exit 1
