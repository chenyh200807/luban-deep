global:
  scrape_interval: 30s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/deeptutor-alerts.yml

scrape_configs:
  - job_name: deeptutor
    metrics_path: /metrics/prometheus
    authorization:
      type: Bearer
      credentials: "${DEEPTUTOR_METRICS_TOKEN}"
    static_configs:
      - targets:
          - 127.0.0.1:8001
